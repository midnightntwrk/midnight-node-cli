name: Integration Test

on: 
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  integration-test:
    runs-on: ubuntu-latest

    steps:
    - name: Check out code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  #v6.0.2

    - name: Set up Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  #v6.4.0
      with:
        node-version: '20.x'

    - name: Install dependencies
      run: npm install

    - name: Build
      run: npm run build

    - name: Start Midnight Node
      run: node dist/cli.js up --detach

    - name: Wait for Node to be Healthy
      run: |
        timeout 30s bash -c \
          'until node dist/cli.js health; do
            sleep 1
          done'

    - name: Check Node Status
      run: node dist/cli.js status

    - name: Stop Midnight Node
      run: node dist/cli.js down
