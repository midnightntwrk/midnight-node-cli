name: Integration Test

on: 
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  integration-test:
    runs-on: ubuntu-latest

    steps:
    - name: Check out code
      uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  #v6.0.1

    - name: Set up Node.js
      uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444  #v5.0.0
      with:
        node-version: '20.x'

    - name: Install dependencies
      run: npm install

    - name: Build
      run: npm run build

    - name: Start Midnight Node
      run: node dist/cli.js up --detach

    - name: Wait for Node to be Healthy
      run: |
        timeout 30s bash -c \
          'until node dist/cli.js health; do
            sleep 1
          done'

    - name: Check Node Status
      run: node dist/cli.js status

    - name: Stop Midnight Node
      run: node dist/cli.js down
